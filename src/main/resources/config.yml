economy:
  enchant:
    book_unit: 3000
    gear_unit: 1000
    coeff_6:
      - mending
      - silk_touch
      - fortune
      - looting
      - luck_of_the_sea
      - lure
    coeff_0:
      - binding_curse
      - vanishing_curse
  base_prices:
    bow: 120
    fishing_rod: 90

cook:
  campfire_auto_extinguish_minutes: 10
  water:
    record_ttl_hours: 72
    record_limit: 10000
  smoker_buffer:
    tick_interval_ticks: 20
