# NationWar config
# Server timezone is fixed to Asia/Seoul for daily upkeep.

spawn-protection:
  world: world
  center-x: 0
  center-z: 0
  radius: 10

money:
  start-balance: 0
  pvp-steal-percent: 10  # victim money percent, floor
  pvp-steal-per-combat-level: 100

stat:
  xp-per-point: 100  # 100XP => 1 스탯포인트(레벨)

nation:
  max-level: 100
  upgrade-cost-multiplier: 5000   # cost = currentLevel * multiplier
  daily-upkeep-multiplier: 1000   # upkeep = level * multiplier
  arrears-days-for-level-down: 5
  territory:
    size-x: 16
    size-z: 16
    min-y: 0
    max-y: 320

nexus:
  give-on-first-join: true
  place:
    min-y: 50
    max-y: 300
  overworld-invulnerable: true

war:
  world-name: War_World
  border-size: 500
  flat:
    enabled: true
    biome: PLAINS
    y-level: 64
  match:
    min-team-size: 3
    ready-time-seconds: 120
    assist-window-seconds: 15
  spawns:
    team-a:
      x: 0
      y: 64
      z: -200
    team-b:
      x: 0
      y: 64
      z: 200

structures:
  nexus:
    size: 4
    max-health: 50
    regen-per-second: 0.5
  inhibitor:
    size: 4
    max-health: 20
    regen-per-second: 0.5
    max-level: 10
    upgrade-cost-multiplier: 5000
  turret:
    size-x: 3
    size-z: 3
    size-y: 8
    max-health: 10
    damage-per-second: 6
    range: 20
    max-level: 10
    upgrade-cost-multiplier: 5000

jobs:
  max-per-player: 2
  remove-cooldown-hours: 24
  available:
    - MINER
    - FARMER
    - COOK
    - FISHER
    - HUNTER
    - BREWER
  proficiency:
    xp-per-level: 100          # 모든 구간 100 고정
    max-level: 100
    # 숙련도 획득량 (직업별 행동 1회당)
    xp-per-action:
      miner: 1      # 자연 생성 광석 채굴 1회
      farmer: 1     # 직접 심은 작물 직접 수확 1회
      fisher: 1     # 낚시 1회
      hunter: 1     # 몹 처치 1회
      cook: 1       # 요리 완료 1회
    # 승급에 필요한 숙련도 레벨 (등급 인덱스 0~7)
    rank-promotion-levels:
      0: 0     # 신입
      1: 5     # 폐급
      2: 10    # 초급
      3: 20    # 중급
      4: 30    # 상급
      5: 50    # 최상급
      6: 70    # 특급
      7: 100   # 짬킹

resource-packs:
  enabled: true
  # 리소스팩 거부 시 서버에서 킥할지 여부
  force: true
  # 리소스팩 다운로드 안내 메시지
  prompt: "§e[NationWar] §f커스텀 HUD를 위해 리소스팩을 설치해주세요!"
  packs:
    vanilla-hud-hide:
      url: "https://files.manuscdn.com/user_upload_by_module/session_file/310519663342695035/JvoAxzYrwMbZBCgF.zip"
      hash: "80a4b33a3f3ffe3f9a85529a45c3e40ca54c6fe2"
    betterhud-pack:
      url: "https://files.manuscdn.com/user_upload_by_module/session_file/310519663342695035/yhnzNfwFiaYwcxig.zip"
      hash: "20f0104635bcb8923848828171c1aa0f782f7909"

hud:
  actionbar-update-ticks: 20

ui:
  damage-indicator:
    enabled: false
  border-visual:
    period-ticks: 5
    particle: DUST
    dust-size: 1.1
    step: 1.0
    default-seconds: 15
  menu-combo:
    enabled: true
    # F+F+Q 조합으로 플레이어 메뉴 열기 (서버가 감지 가능한 키만 사용)
    # 주의: Q(드랍) 이벤트는 손에 아이템이 있을 때만 발생합니다.
    # 따라서 기본값은 false로 두고, 콤보 인식 시 드랍은 자동으로 취소됩니다.
    require-empty-hands: false
    window-ms: 700


