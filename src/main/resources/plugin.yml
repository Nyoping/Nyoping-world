name: NationWar
version: 1.0.0
main: kr.wonguni.nationwar.NationWarPlugin
api-version: '1.21'
author: wonguni

commands:
  givecookfood:
    description: Give custom cook food (placeholder bread)
    usage: /givecookfood <type> [amount]
    permission: nationwar.admin
  givecropseed:
    description: Give custom crop seeds
    usage: /givecropseed <type> [amount]
    permission: nationwar.admin
  jobadmin:
    description: Job admin utilities. (OP)
    usage: /jobadmin <rank|reset|cooldown>
  shop:
    description: Open the job sell shop.
    usage: /shop [sell|reload]
  menu:
    description: Open main menu.
    usage: /menu
  nation:
    description: Nation commands.
    usage: /nation help
  war:
    description: War & matchmaking commands.
    usage: /war help
  money:
    description: Show your balance.
    usage: /money
  pay:
    description: Pay money to a player.
    usage: /pay <player> <amount>
  bind:
    description: Bind the item in your hand to a player. (OP)
    usage: /bind <player>
  abind:
    description: Absolute-bind the item in your hand to a player. (OP)
    usage: /abind <player>
  nexus:
    description: Nexus utility. (OP)
    usage: /nexus give <player>

  stat:
    description: Stat points and upgrades.
    usage: /stat [info|up <stat>]

permissions:
  nationwar.admin:
    default: op
  nationwar.bind:
    default: op
  nationwar.nexus:
    default: op
